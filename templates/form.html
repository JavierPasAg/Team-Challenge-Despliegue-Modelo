<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de predicción</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <div class="top-bar">
      <div>
        <p class="eyebrow">Predicción interactiva</p>
        <h1 class="page-title">Estimar ingreso anual</h1>
      </div>
      <a href="{{ url_for('hello') }}" class="btn btn-secondary">Volver</a>
    </div>

    <div class="layout">
      <section class="main-card">
        <h2>Datos del alojamiento</h2>

        <form id="prediction-form" class="form-grid">
          <div class="form-group">
            <label for="accommodates">Capacidad</label>
            <input type="number" id="accommodates" name="accommodates" step="1" placeholder="Ej. 4">
          </div>

          <div class="form-group">
            <label for="availability_365">Disponibilidad anual</label>
            <input type="number" id="availability_365" name="availability_365" step="1" placeholder="Ej. 220">
          </div>

          <div class="form-group full-width">
            <label for="bathrooms">Baños</label>
            <input type="number" id="bathrooms" name="bathrooms" step="0.5" placeholder="Ej. 1">
          </div>

          <div class="full-width">
            <button type="submit" class="btn btn-primary">Calcular predicción</button>
          </div>
        </form>
      </section>

      <aside class="side-card">
        <h2>Resumen</h2>

        <div class="summary-item">
          <span>Capacidad</span>
          <strong id="summary-accommodates">—</strong>
        </div>

        <div class="summary-item">
          <span>Disponibilidad anual</span>
          <strong id="summary-availability_365">—</strong>
        </div>

        <div class="summary-item">
          <span>Baños</span>
          <strong id="summary-bathrooms">—</strong>
        </div>

        <hr>

        <h2>Resultado</h2>
        <div id="result" class="result-box">
          Aquí aparecerá la predicción.
        </div>
      </aside>
    </div>
  </main>

  <script>
    const form = document.getElementById("prediction-form");
    const resultBox = document.getElementById("result");

    const fields = {
      accommodates: document.getElementById("accommodates"),
      availability_365: document.getElementById("availability_365"),
      bathrooms: document.getElementById("bathrooms")
    };

    const summary = {
      accommodates: document.getElementById("summary-accommodates"),
      availability_365: document.getElementById("summary-availability_365"),
      bathrooms: document.getElementById("summary-bathrooms")
    };

    function refreshSummary() {
      summary.accommodates.textContent = fields.accommodates.value || "—";
      summary.availability_365.textContent = fields.availability_365.value || "—";
      summary.bathrooms.textContent = fields.bathrooms.value || "—";
    }

    Object.values(fields).forEach(input => {
      input.addEventListener("input", refreshSummary);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        accommodates: parseFloat(fields.accommodates.value),
        availability_365: parseFloat(fields.availability_365.value),
        bathrooms: parseFloat(fields.bathrooms.value)
      };

      resultBox.textContent = "Calculando...";

      try {
        const response = await fetch("/api/v1/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          resultBox.textContent = data.error || "No se pudo obtener la predicción.";
          return;
        }

        const formatted = Number(data.prediction).toLocaleString("es-ES", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });

        resultBox.innerHTML = `
          <div class="prediction-value">${formatted} €</div>
          <div class="prediction-status">Estado: ${data.status || "success"}</div>
          ${data.note ? `<div class="prediction-note">${data.note}</div>` : ""}
        `;
      } catch (error) {
        resultBox.textContent = "Error de conexión con la API.";
      }
    });

    refreshSummary();
  </script>
</body>
</html>
